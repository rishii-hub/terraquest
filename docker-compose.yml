# Local development dependencies.
#
# PostGIS rather than plain Postgres: country resolution uses point-in-polygon
# against Natural Earth boundaries, and location distance queries use geography
# types. Neither works on stock Postgres.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: terraquest-postgres
    environment:
      POSTGRES_DB: terraquest
      POSTGRES_USER: terraquest
      POSTGRES_PASSWORD: local_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Flyway on startup races the container otherwise.
      test: ["CMD-SHELL", "pg_isready -U terraquest -d terraquest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: terraquest-redis
    ports:
      - "6379:6379"
    # Leaderboards are derivable from Postgres, so persistence here is a
    # convenience, not a durability requirement.
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
